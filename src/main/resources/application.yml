spring:
  application:
    name: app
  profiles:
    active: development
  jackson:
    default-property-inclusion: non-null
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc.batch_size: 10
        format_sql: true
        use_sql_comments: true

rsa:
  private-key: ${JWT_PRIVATE_KEY_VALUE:classpath:certs/private.pem}
  public-key: ${JWT_PUBLIC_KEY_VALUE:classpath:certs/public.pem}

logging:
  level:
    root: INFO

config:
  admin:
    email: ${ADMIN_EMAIL:hexlet@example.com}
    password: ${ADMIN_PASSWORD:qwerty}
