spring:
  application:
    name: app
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}
  jackson:
    default-property-inclusion: non-null
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc.batch_size: 10
        format_sql: true
        use_sql_comments: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

jwt:
  exp-minutes: 60

rsa:
  private-key: ${JWT_PRIVATE_KEY_VALUE:classpath:certs/private.pem}
  public-key: ${JWT_PUBLIC_KEY_VALUE:classpath:certs/public.pem}

logging:
  level:
    root: INFO

config:
  admin:
    email: ${ADMIN_EMAIL:hexlet@example.com}
    password: ${ADMIN_PASSWORD:qwerty}

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 1.0