spring:
  application:
    name: app
  profiles:
    active: development
  jackson:
    default-property-inclusion: non-null
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc.batch_size: 10
        format_sql: true
        use_sql_comments: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: ${JWT_PUBLIC_KEY_PATH:classpath:certs/public.pem}
          private-key-location: ${JWT_PRIVATE_KEY_PATH:classpath:certs/private.pem}


logging:
  level:
    root: INFO

config:
  admin:
    email: ${ADMIN_EMAIL:hexlet@example.com}
    password: ${ADMIN_PASSWORD:qwerty}

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 1.0